schema-version = "1.10.0"

[install]
torch.pkg-path = "flox-cuda/python3Packages.torch"
torchvision.pkg-path = "flox-cuda/python3Packages.torchvision"
faiss.pkg-path = "flox-cuda/python3Packages.faiss"
ollama.pkg-path = "flox-cuda/ollama"
ollama.pkg-group = "ollama"
marimo.pkg-path = "marimo"
typing-extensions.pkg-path = "python313Packages.typing-extensions"
sympy.pkg-path = "python313Packages.sympy"
git.pkg-path = "git"

[profile]
common = '''
  alias pull="ollama pull qwen2.5:0.5b"
  alias notebook="marimo edit notebook.py"
'''

[services]
ollama.command = "ollama serve"

[options]
systems = ["x86_64-linux", "aarch64-linux"]
